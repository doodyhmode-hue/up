<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>اختبار الاتصال بالبوت</title>
</head>
<body dir="rtl" style="font-family: Tahoma; text-align: center; padding: 30px;">
    <h2>اختبار إرسال رسالة إلى تيليجرام</h2>
    <button id="sendBtn" style="padding: 15px 30px; font-size: 18px;">إرسال رسالة تجريبية</button>
    <p id="status"></p>

    <script>
        const BOT_TOKEN = '8848720448:AAGgjjusWWTYNKLIs_3auDQW6DQDK0kaZfc';
        const CHAT_ID = '6969346690';
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'جاري الإرسال...';

            try {
                const response = await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: '✅ اختبار ناجح من صفحة GitHub! ' + new Date().toLocaleString()
                    })
                });

                const result = await response.json();
                if (result.ok) {
                    statusEl.textContent = 'تم الإرسال بنجاح! تحقق من تيليجرام.';
                    statusEl.style.color = 'green';
                } else {
                    statusEl.textContent = 'فشل: ' + JSON.stringify(result);
                    statusEl.style.color = 'red';
                }
            } catch (error) {
                statusEl.textContent = 'خطأ في الشبكة: ' + error.message;
                statusEl.style.color = 'red';
            }
        });
    </script>
</body>
</html>
